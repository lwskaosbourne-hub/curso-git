    <h1><strong>git status</strong></h1>
    <p>(Mostra o status do projeto)</p>

    <h1><strong>git log --pretty=oneline</strong></h1>
    <p>(Mostra o status do projeto)</p>

    <h1><strong>git checkout -b "nome-da-branch"</strong></h1>
    <p>(Cria uma nova branch fora da branch main)</p>
    
    <h1><strong>git push --set-upstream origin nova-feature</strong></h1>
    <p>(Faz um push para o repositório direto da feature atual)</p>
